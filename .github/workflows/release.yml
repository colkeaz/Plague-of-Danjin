name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: PlagueOfDanjin-linux
          - os: windows-latest
            platform: windows
            artifact: PlagueOfDanjin-windows
          - os: macos-latest
            platform: macos
            artifact: PlagueOfDanjin-macos

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Fat JAR
        run: ./gradlew fatJar
        shell: bash

      - name: Package with jpackage (Linux)
        if: matrix.platform == 'linux'
        run: |
          jpackage \
            --input build/libs \
            --main-jar PlagueOfDanjin-1.0.0-all.jar \
            --main-class view.DesktopLauncher \
            --name PlagueOfDanjin \
            --app-version 1.0.0 \
            --dest build/package \
            --type app-image \
            --java-options "-Xmx512m"

      - name: Package with jpackage (Windows)
        if: matrix.platform == 'windows'
        run: |
          jpackage --input build/libs --main-jar PlagueOfDanjin-1.0.0-all.jar --main-class view.DesktopLauncher --name PlagueOfDanjin --app-version 1.0.0 --dest build/package --type app-image --java-options "-Xmx512m"
        shell: cmd

      - name: Package with jpackage (macOS)
        if: matrix.platform == 'macos'
        run: |
          jpackage \
            --input build/libs \
            --main-jar PlagueOfDanjin-1.0.0-all.jar \
            --main-class view.DesktopLauncher \
            --name PlagueOfDanjin \
            --app-version 1.0.0 \
            --dest build/package \
            --type app-image \
            --java-options "-Xmx512m"

      - name: Create ZIP archive (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd build/package
          zip -r ../../${{ matrix.artifact }}.zip .
        shell: bash

      - name: Create ZIP archive (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd build/package
          Compress-Archive -Path * -DestinationPath "../../${{ matrix.artifact }}.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Plague of Danjin ${{ github.ref_name }}"
          body: "## Plague of Danjin ${{ github.ref_name }}\n\nA graphical 8-bit roguelike dungeon crawler.\n\n### Download\nChoose the version for your operating system:\n- **Windows**: `PlagueOfDanjin-windows.zip`\n- **macOS**: `PlagueOfDanjin-macos.zip`\n- **Linux**: `PlagueOfDanjin-linux.zip`\n\n### How to Play\n1. Download the ZIP for your platform\n2. Extract the archive\n3. Run `PlagueOfDanjin` (or `PlagueOfDanjin.exe` on Windows)\n\nNo Java installation required — the runtime is bundled."
          files: |
            artifacts/PlagueOfDanjin-windows/PlagueOfDanjin-windows.zip
            artifacts/PlagueOfDanjin-macos/PlagueOfDanjin-macos.zip
            artifacts/PlagueOfDanjin-linux/PlagueOfDanjin-linux.zip
