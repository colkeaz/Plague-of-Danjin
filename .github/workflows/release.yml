name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: PlagueOfDanjin-linux
          - os: windows-latest
            platform: windows
            artifact: PlagueOfDanjin-windows
          - os: macos-latest
            platform: macos
            artifact: PlagueOfDanjin-macos

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Fat JAR
        run: ./gradlew fatJar
        shell: bash

      - name: Package with jpackage (Linux)
        if: matrix.platform == 'linux'
        run: |
          jpackage \
            --input build/libs \
            --main-jar PlagueOfDanjin-1.0.0-all.jar \
            --main-class view.DesktopLauncher \
            --name PlagueOfDanjin \
            --app-version 1.0.0 \
            --dest build/package \
            --type app-image \
            --java-options "-Xmx512m"

      - name: Package with jpackage (Windows)
        if: matrix.platform == 'windows'
        run: |
          jpackage --input build/libs --main-jar PlagueOfDanjin-1.0.0-all.jar --main-class view.DesktopLauncher --name PlagueOfDanjin --app-version 1.0.0 --dest build/package --type app-image --java-options "-Xmx512m"
        shell: cmd

      - name: Package with jpackage (macOS)
        if: matrix.platform == 'macos'
        run: |
          jpackage \
            --input build/libs \
            --main-jar PlagueOfDanjin-1.0.0-all.jar \
            --main-class view.DesktopLauncher \
            --name PlagueOfDanjin \
            --app-version 1.0.0 \
            --dest build/package \
            --type app-image \
            --java-options "-Xmx512m"

      - name: Create ZIP archive (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd build/package
          zip -r ../../${{ matrix.artifact }}.zip .
        shell: bash

      - name: Create ZIP archive (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd build/package
          Compress-Archive -Path * -DestinationPath "../../${{ matrix.artifact }}.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Plague of Danjin ${{ github.ref_name }}"
         body: |
          ## Plague of Danjin ${{ github.ref_name }}

          This will be the latest release of the new and improved Plague of Danjin, from a terminal-based dungeon crawler terminal game to a fully functional game where it has dedicated ui and actual app, if there were problems or bugs encountered, feel free to message any of my social accounts found in my profile.
          
          Thank you and have fun!

          ### Download
          Choose the version for your operating system:
          - **Windows**: `PlagueOfDanjin-windows.zip`
          - **macOS**: `PlagueOfDanjin-macos.zip`
          - **Linux**: `PlagueOfDanjin-linux.zip`

          ### How to Play
          1. Download the ZIP for your platform
          2. Extract the archive
          3. Run `PlagueOfDanjin` (or `PlagueOfDanjin.exe` on Windows)

          No Java installation required — the runtime is bundled.
          files: |
            artifacts/PlagueOfDanjin-windows/PlagueOfDanjin-windows.zip
            artifacts/PlagueOfDanjin-macos/PlagueOfDanjin-macos.zip
            artifacts/PlagueOfDanjin-linux/PlagueOfDanjin-linux.zip
